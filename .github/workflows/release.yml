name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller coach.spec --distpath dist --workpath build/work --clean

      - name: Verify artifact
        shell: pwsh
        run: |
          if (!(Test-Path "dist/ValorantCoach.exe")) {
            Write-Error "EXE not found at dist/ValorantCoach.exe"
            exit 1
          }
          $size = (Get-Item "dist/ValorantCoach.exe").Length / 1MB
          Write-Host "EXE size: $([math]::Round($size, 1)) MB"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ValorantCoach-windows-${{ github.sha }}
          path: dist/ValorantCoach.exe
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ValorantCoach.exe
          generate_release_notes: true
          body: |
            ## Setup

            1. Download `ValorantCoach.exe`
            2. Create a `.env` file in the same folder:
               ```
               ANTHROPIC_API_KEY=sk-ant-...
               ```
            3. Run `ValorantCoach.exe` - it creates `config.yaml` automatically on first run
            4. Run `calibrate.py` once (requires Python) or edit `config.yaml` to set your minimap position
            5. Open Valorant and the coach detects your map automatically
